<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite GCSE/A-Level Study Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c3a6ff;
            --secondary: #ff7eb9;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }

        /* Glass Panel Styling */
        .panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1, h2 { margin-bottom: 20px; color: var(--primary); text-align: center; }

        /* Configurator */
        .config-row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        select, input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px;
            border-radius: 8px;
            outline: none;
        }

        /* Grade Predictor */
        .predictor-box { text-align: center; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 15px; }
        .grade-display { font-size: 3rem; font-weight: 700; color: var(--secondary); margin: 10px 0; }

        /* Task List */
        .task-input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .task-input-group input { flex: 1; }
        .btn {
            background: var(--primary);
            border: none;
            color: #1e1b4b;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(195, 166, 255, 0.4); }

        .task-item {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid gray;
        }
        .conf-low { border-left-color: #ff4d4d; }
        .conf-mid { border-left-color: #ffcc00; }
        .conf-high { border-left-color: #00ff88; }

    </style>
</head>
<body>

    <h1 style="font-size: 2.5rem; margin-bottom: 40px;">Elite Study Space 🚀</h1>

    <div class="container">
        
        <div class="panel">
            <h2>Exam Board Config</h2>
            <div class="config-row">
                <span>Maths</span>
                <select id="board-maths">
                    <option value="edexcel">Edexcel</option>
                    <option value="aqa">AQA</option>
                </select>
            </div>
            <div class="config-row">
                <span>English Lit</span>
                <select id="board-english">
                    <option value="aqa">AQA</option>
                    <option value="edexcel">Edexcel</option>
                </select>
            </div>

            <hr style="margin: 20px 0; opacity: 0.2;">

            <h2>Grade Predictor</h2>
            <div class="predictor-box">
                <p>Enter Mock Score (%)</p>
                <input type="number" id="mock-score" placeholder="e.g. 75" style="width: 80px; text-align: center;">
                <button class="btn" onclick="calculateGrade()" style="margin-left: 10px;">Predict</button>
                <div class="grade-display" id="grade-result">-</div>
                <p id="grade-message">Enter a score to see your predicted GCSE grade.</p>
            </div>
        </div>

        <div class="panel">
            <h2>Subject Topic Tracker</h2>
            <div class="task-input-group">
                <input type="text" id="task-name" placeholder="Topic (e.g. Algebra)">
                <select id="task-conf">
                    <option value="conf-low">Low Confidence</option>
                    <option value="conf-mid">Medium</option>
                    <option value="conf-high">High</option>
                </select>
                <button class="btn" onclick="addTask()">Add</button>
            </div>
            <div id="task-list">
                </div>
        </div>

    </div>

    <script>
        // GRADE PREDICTION LOGIC (Based on roughly 2025 Edexcel/AQA boundaries)
        function calculateGrade() {
            const score = parseInt(document.getElementById('mock-score').value);
            const board = document.getElementById('board-maths').value;
            const resultDiv = document.getElementById('grade-result');
            const messageDiv = document.getElementById('grade-message');

            if (isNaN(score)) return;

            let grade = "U";
            let nextGrade = "";

            // Simple logic: Edexcel Maths Higher typically needs ~80% for a 9
            if (score >= 80) grade = "9";
            else if (score >= 70) grade = "8";
            else if (score >= 60) grade = "7";
            else if (score >= 50) grade = "6";
            else if (score >= 40) grade = "5";
            else grade = "4 or below";

            resultDiv.innerText = grade;
            messageDiv.innerText = `Based on ${board.toUpperCase()} typical boundaries, you're on track for a ${grade}!`;
        }

        // TASK TRACKER LOGIC
        function addTask() {
            const name = document.getElementById('task-name').value;
            const conf = document.getElementById('task-conf').value;
            const list = document.getElementById('task-list');

            if (name === "") return;

            const item = document.createElement('div');
            item.className = `task-item ${conf}`;
            item.innerHTML = `
                <span>${name}</span>
                <button onclick="this.parentElement.remove()" style="background:none; border:none; color:white; cursor:pointer; opacity:0.5;">✕</button>
            `;
            
            list.prepend(item);
            document.getElementById('task-name').value = "";
        }
    </script>
</body>
</html>
