<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro GCSE Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #c3a6ff;
            --secondary: #ff7eb9;
            --success: #00ff88;
            --warning: #ffcc00;
            --danger: #ff4d4d;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: white;
            padding: 20px;
            min-height: 100vh;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 1100px) { .dashboard-grid { grid-template-columns: 1fr; } }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h2 { font-size: 1.2rem; margin-bottom: 15px; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        /* Subject Picker */
        select, input, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
        }
        select, input { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-add { background: var(--primary); color: #1e1b4b; font-weight: 600; cursor: pointer; }

        .subject-tag {
            background: rgba(195, 166, 255, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        /* Chart Area */
        .chart-container { height: 200px; position: relative; }

        /* Calendar */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
            font-size: 0.7rem;
        }
        .day { padding: 5px; background: rgba(255,255,255,0.05); border-radius: 4px; }
        .today { background: var(--secondary); color: white; }

        /* Task List */
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .status-not { background: var(--danger); }
        .status-progress { background: var(--warning); }
        .status-done { background: var(--success); }

        .task-card {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header style="text-align: center; margin-bottom: 30px;">
        <h1 style="letter-spacing: 2px;">STUDY OS // GCSE EDITION</h1>
        <p style="opacity: 0.6;">Your Exam Board-specific Revision Hub</p>
    </header>

    <div class="dashboard-grid">
        
        <div class="panel">
            <h2>📚 My Subjects</h2>
            <select id="subject-main">
                <option value="">Choose Subject...</option>
                <option value="Maths">Maths</option>
                <option value="English Lit">English Lit</option>
                <option value="English Lang">English Lang</option>
                <option value="Biology">Biology</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Physics">Physics</option>
                <option value="History">History</option>
                <option value="Geography">Geography</option>
                <option value="Computer Science">Computer Science</option>
            </select>
            <select id="board-select">
                <option value="AQA">AQA</option>
                <option value="Edexcel">Edexcel</option>
                <option value="OCR">OCR</option>
                <option value="WJEC">WJEC</option>
            </select>
            <button class="btn-add" onclick="addSubject()">Enroll Subject</button>
            <div id="subject-list" style="margin-top: 20px;"></div>
        </div>

        <div class="panel">
            <h2>📝 Smart Topic Tracker</h2>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="topic-name" placeholder="Enter topic (e.g. Trig)">
                <select id="topic-status" style="width: 150px;">
                    <option value="0">Not Started</option>
                    <option value="1">In Progress</option>
                    <option value="2">Completed</option>
                </select>
                <button class="btn-add" onclick="addTopic()" style="width: 80px;">Add</button>
            </div>
            <div id="topic-display"></div>
        </div>

        <div class="panel">
            <h2>📊 Progress Overview</h2>
            <div class="chart-container">
                <canvas id="progressChart"></canvas>
            </div>
            
            <hr style="margin: 20px 0; opacity: 0.1;">
            
            <h2>📅 Study Calendar</h2>
            <div class="calendar-grid" id="calendar"></div>
        </div>

    </div>

    <script>
        // --- DATA STATE ---
        let stats = [0, 0, 0]; // Not Started, In Progress, Done
        let myChart;

        // --- CHART INITIALIZATION ---
        const ctx = document.getElementById('progressChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Not Started', 'In Progress', 'Done'],
                datasets: [{
                    data: [1, 1, 1],
                    backgroundColor: ['#ff4d4d', '#ffcc00', '#00ff88'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });

        function updateChart() {
            myChart.data.datasets[0].data = stats;
            myChart.update();
        }

        // --- SUBJECT SYSTEM ---
        function addSubject() {
            const sub = document.getElementById('subject-main').value;
            const board = document.getElementById('board-select').value;
            if(!sub) return;

            const div = document.createElement('div');
            div.className = 'subject-tag';
            div.innerHTML = `<span><b>${sub}</b> (${board})</span> <span onclick="this.parentElement.remove()" style="cursor:pointer">✕</span>`;
            document.getElementById('subject-list').appendChild(div);
        }

        // --- TOPIC SYSTEM ---
        function addTopic() {
            const name = document.getElementById('topic-name').value;
            const statusIdx = parseInt(document.getElementById('topic-status').value);
            if(!name) return;

            stats[statusIdx]++;
            updateChart();

            const statusClass = statusIdx == 0 ? 'status-not' : (statusIdx == 1 ? 'status-progress' : 'status-done');
            const statusText = statusIdx == 0 ? 'Not Started' : (statusIdx == 1 ? 'In Progress' : 'Completed');

            const div = document.createElement('div');
            div.className = 'task-card';
            div.innerHTML = `<span class="status-dot ${statusClass}"></span><b>${name}</b><br><small style="opacity:0.6">${statusText}</small>`;
            document.getElementById('topic-display').prepend(div);
            document.getElementById('topic-name').value = "";
        }

        // --- SIMPLE CALENDAR GENERATOR ---
        function genCal() {
            const cal = document.getElementById('calendar');
            for(let i=1; i<=31; i++) {
                const day = document.createElement('div');
                day.className = i === new Date().getDate() ? 'day today' : 'day';
                day.innerText = i;
                cal.appendChild(day);
            }
        }
        genCal();
    </script>
</body>
</html>
